name: Script Doc Sync Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify script/docs/skills stay in sync
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git ls-files)"
          else
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          fi

          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          # Any change under scripts/*.fish OR scripts/_py/*.py is a behavior
          # change that must keep README/skills/tests in sync.
          if ! printf '%s\n' "$CHANGED_FILES" | grep -Eq '^scripts/.*\.fish$|^scripts/_py/.*\.py$'; then
            echo "No script changes detected; sync check not required."
            exit 0
          fi

          DOC_CHANGED=false
          SKILL_CHANGED=false
          TESTS_CHANGED=false

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^README\.md$'; then
            DOC_CHANGED=true
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^skills/.*/SKILL\.md$|^skills/README\.md$'; then
            SKILL_CHANGED=true
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^tests/.*\.fish$'; then
            TESTS_CHANGED=true
          fi

          if [[ "$DOC_CHANGED" != true || "$SKILL_CHANGED" != true || "$TESTS_CHANGED" != true ]]; then
            echo "Script change detected without required sync updates." >&2
            echo "Required with scripts/*.fish or scripts/_py/*.py changes:" >&2
            echo "  - README.md"                                  >&2
            echo "  - skills/*/SKILL.md or skills/README.md"      >&2
            echo "  - tests/*.fish"                               >&2
            exit 1
          fi

          echo "Script/docs/skills/tests sync check passed."
