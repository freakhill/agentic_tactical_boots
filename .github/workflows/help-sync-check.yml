name: Help Sync Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  help-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish

      # uv runs the PEP-723 Python helper that does the README parsing and
      # script rewriting (scripts/_py/sync_help_from_readme.py).
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # Fails if any AUTOGEN: examples block in scripts/*.fish is out of sync
      # with the named README section. To fix locally, run:
      #   scripts/slop-sync-help.fish sync
      - name: Verify help text is in sync with README
        run: fish scripts/slop-sync-help.fish check
