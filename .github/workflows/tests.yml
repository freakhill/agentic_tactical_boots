name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fish-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish

      # uv is the project policy for any Python invocation (PEP-723 inline
      # metadata in scripts/_py/*.py pins the interpreter version).
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run test suite
        run: fish tests/run.fish
