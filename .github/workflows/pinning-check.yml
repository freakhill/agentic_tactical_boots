name: Pinning Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pinning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish

      - name: Run pinning check
        run: fish scripts/check-pinning.fish
